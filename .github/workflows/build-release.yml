name: Build and Publish Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y libsecret-1-dev rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Build renderer
        run: npx vite build --config src/renderer/vite.config.ts

      - name: Build Linux packages
        run: npx electron-builder --linux AppImage deb rpm --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zap-browser-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build renderer
        run: npx vite build --config src/renderer/vite.config.ts

      - name: Build Windows installer and portable builds
        run: npx electron-builder --win nsis portable zip --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zap-browser-windows
          path: |
            dist/*.exe
            dist/*.zip

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-windows

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md <<NOTES
          # ⚡ Zap Browser ${{ github.ref_name }}

          Automated cross-platform beta release.

          ## Highlights

          - Lightning payment confirmation before sending sats
          - Payment sent confirmation popup with amount and preimage preview
          - Real-time incoming sats notifications while browsing
          - Strict IPC validation hardening across sensitive channels
          - SECURITY.md responsible disclosure policy
          - Improved address bar suggestions with favicon support
          - Better BrowserView layering for dropdowns and browser UI
          - Refreshed app icon and packaging assets
          - Improved popup/interstitial blocking behavior
          - Theme polish and UI refinements

          ## Security

          - Hardened IPC payload validation
          - Improved Nostr/NWC/LNURL/Cashu input checks
          - Safer Lightning payment flow with explicit user confirmation

          ## Builds

          - Linux AppImage
          - Debian package
          - RPM package
          - Windows NSIS installer
          - Windows portable ZIP build

          ## Notes

          This is still beta software intended for testing and feedback.

          Do not store large funds inside the browser yet.

          Windows builds are experimental.
          NOTES

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Zap Browser ${{ github.ref_name }} — Security, Lightning UX & Browser Polish
          body_path: RELEASE_NOTES.md
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.exe
            release-artifacts/**/*.zip
